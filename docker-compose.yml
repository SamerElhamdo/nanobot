x-common-config: &common-config
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - ~/.nanobot:/root/.nanobot

services:
  nanobot-gateway:
    container_name: nanobot-gateway
    <<: *common-config
    entrypoint: ["sh", "-c"]
    command: ["nanobot ensure-config && exec nanobot gateway"]
    restart: unless-stopped
    ports:
      - 18790:18790
    environment:
      # Provider (merged into config only when empty; existing values preserved)
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      # Default model (e.g. anthropic/claude-opus-4-5)
      - NANOBOT_DEFAULT_MODEL=${NANOBOT_DEFAULT_MODEL:-}
      # Telegram (optional)
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_ENABLED=${TELEGRAM_ENABLED:-}
      - TELEGRAM_ALLOW_FROM=${TELEGRAM_ALLOW_FROM:-}
      - TELEGRAM_REPLY_TO_MESSAGE=${TELEGRAM_REPLY_TO_MESSAGE:-}
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
  
  nanobot-cli:
    <<: *common-config
    profiles:
      - cli
    command: ["status"]
    stdin_open: true
    tty: true
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - NANOBOT_DEFAULT_MODEL=${NANOBOT_DEFAULT_MODEL:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_ENABLED=${TELEGRAM_ENABLED:-}
      - TELEGRAM_ALLOW_FROM=${TELEGRAM_ALLOW_FROM:-}
      - TELEGRAM_REPLY_TO_MESSAGE=${TELEGRAM_REPLY_TO_MESSAGE:-}
