x-common-config: &common-config
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - ~/.nanobot:/root/.nanobot

services:
  nanobot-gateway:
    container_name: nanobot-gateway
    <<: *common-config
    entrypoint: ["sh", "-c"]
    command: ["nanobot ensure-config && (echo N | nanobot onboard) && exec nanobot gateway"]
    restart: unless-stopped
    ports:
      - 18790:18790
    environment:
      # Provider (merged into config only when empty; existing values preserved)
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      # Default model (e.g. anthropic/claude-opus-4-5)
      - NANOBOT_DEFAULT_MODEL=${NANOBOT_DEFAULT_MODEL:-}
      # Telegram (optional)
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_ENABLED=${TELEGRAM_ENABLED:-}
      - TELEGRAM_ALLOW_FROM=${TELEGRAM_ALLOW_FROM:-}
      - TELEGRAM_REPLY_TO_MESSAGE=${TELEGRAM_REPLY_TO_MESSAGE:-}
      # Admin API (optional; if set, UI must send this token)
      - GATEWAY_ADMIN_TOKEN=${GATEWAY_ADMIN_TOKEN:-}
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  # Admin UI: port 3000, no auth. Set gateway URL (e.g. http://nanobot-gateway:18790) and token in the UI.
  nanobot-admin-ui:
    container_name: nanobot-admin-ui
    <<: *common-config
    command: ["nanobot", "admin-ui"]
    ports:
      - 3000:3000
    volumes:
      - ./admin-ui/dist:/app/admin-ui/dist:ro
    profiles:
      - admin-ui

  nanobot-cli:
    <<: *common-config
    profiles:
      - cli
    command: ["status"]
    stdin_open: true
    tty: true
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - NANOBOT_DEFAULT_MODEL=${NANOBOT_DEFAULT_MODEL:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_ENABLED=${TELEGRAM_ENABLED:-}
      - TELEGRAM_ALLOW_FROM=${TELEGRAM_ALLOW_FROM:-}
      - TELEGRAM_REPLY_TO_MESSAGE=${TELEGRAM_REPLY_TO_MESSAGE:-}
